<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 图书借阅管理系统（同步版）</title>
    <!-- 引入 Supabase 客户端 -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* 样式与之前完全一致，此处省略以保证回答简洁，实际使用请粘贴完整样式 */
        /* 您可以复制之前我提供的所有 CSS 样式到这里 */
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #4a6cf7;
            --primary-hover: #3b5de7;
            --borrow-color: #f59e0b;
            --borrow-hover: #d97706;
            --return-color: #10b981;
            --return-hover: #059669;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1), 0 4px 10px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(74, 108, 247, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(16, 185, 129, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(245, 158, 11, 0.02) 0%, transparent 60%);
        }
        .container { width: 100%; max-width: 820px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        .header { text-align: center; padding: 10px 0; }
        .header .icon-row { font-size: 48px; margin-bottom: 4px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .header h1 {
            font-size: 1.8rem; font-weight: 700; letter-spacing: -0.02em; color: var(--text);
            background: linear-gradient(135deg, #4a6cf7, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header .subtitle { font-size: 0.9rem; color: var(--text-secondary); margin-top: 2px; }
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 24px 28px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: var(--transition); }
        .tab-switch { display: flex; gap: 0; background: #f1f5f9; border-radius: 30px; padding: 4px; position: relative; overflow: hidden; }
        .tab-btn {
            flex: 1; padding: 12px 20px; border: none; background: transparent; border-radius: 26px; cursor: pointer;
            font-size: 0.95rem; font-weight: 600; color: var(--text-secondary); transition: var(--transition);
            position: relative; z-index: 1; white-space: nowrap; letter-spacing: 0.01em;
        }
        .tab-btn.active { color: #fff; box-shadow: var(--shadow-sm); }
        .tab-btn.active.tab-borrow { background: var(--borrow-color); }
        .tab-btn.active.tab-return { background: var(--return-color); }
        .tab-btn:not(.active):hover { color: var(--text); background: rgba(255, 255, 255, 0.5); }
        .tab-icon { margin-right: 6px; }
        .form-section { display: none; flex-direction: column; gap: 14px; animation: fadeSlideIn 0.35s ease; }
        .form-section.active { display: flex; }
        @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .form-group { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
        .form-group input {
            padding: 11px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm);
            font-size: 0.95rem; transition: var(--transition); background: #fafbfc; color: var(--text); outline: none;
        }
        .form-group input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1); }
        .form-group input::placeholder { color: #c0c8d2; }
        .submit-btn {
            padding: 12px 28px; border: none; border-radius: 30px; font-size: 1rem; font-weight: 700; cursor: pointer;
            color: #fff; transition: var(--transition); align-self: flex-start; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 6px;
        }
        .submit-btn.btn-borrow { background: var(--borrow-color); }
        .submit-btn.btn-borrow:hover { background: var(--borrow-hover); box-shadow: var(--shadow); transform: translateY(-1px); }
        .submit-btn.btn-return { background: var(--return-color); }
        .submit-btn.btn-return:hover { background: var(--return-hover); box-shadow: var(--shadow); transform: translateY(-1px); }
        .submit-btn:active { transform: scale(0.97); }
        .table-section { position: relative; }
        .table-header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .table-title { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .table-actions-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .btn-sm { padding: 7px 14px; border-radius: 20px; border: none; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: var(--transition); white-space: nowrap; }
        .btn-lock { background: #f1f5f9; color: #64748b; }
        .btn-lock:hover { background: #e2e8f0; color: #475569; }
        .btn-change-pwd { background: #fef3c7; color: #92400e; }
        .btn-change-pwd:hover { background: #fde68a; }
        .btn-clear-all { background: #fee2e2; color: #991b1b; }
        .btn-clear-all:hover { background: #fecaca; }
        .lock-overlay {
            position: absolute; inset: 0; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); border-radius: var(--radius); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10; gap: 16px; padding: 30px;
            transition: opacity 0.4s ease, visibility 0.4s ease; border: 2px dashed #dce3eb;
        }
        .lock-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .lock-icon { font-size: 56px; animation: pulse 2.5s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.12); } }
        .lock-overlay .lock-label { font-weight: 700; font-size: 1rem; color: #64748b; }
        .lock-input-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .lock-input-row input {
            padding: 10px 16px; border: 2px solid #dce3eb; border-radius: 25px; font-size: 1rem; outline: none;
            width: 180px; text-align: center; font-family: var(--font-mono); letter-spacing: 0.15em; transition: var(--transition); background: #fff;
        }
        .lock-input-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1); }
        .lock-input-row input.wrong { border-color: #ef4444; animation: shake 0.5s ease; background: #fef2f2; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
        .btn-unlock { padding: 10px 22px; border-radius: 25px; border: none; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; font-size: 0.95rem; transition: var(--transition); }
        .btn-unlock:hover { background: var(--primary-hover); box-shadow: var(--shadow); }
        .lock-hint { font-size: 0.78rem; color: #a0aec0; text-align: center; }
        .table-wrapper { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; min-width: 650px; }
        table thead { background: #f8fafc; position: sticky; top: 0; }
        table th { padding: 12px 14px; text-align: left; font-weight: 700; color: #475569; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid #e2e8f0; }
        table td { padding: 11px 14px; border-bottom: 1px solid #f1f5f9; color: var(--text); }
        table tbody tr:hover { background: #f8fafc; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 15px; font-size: 0.75rem; font-weight: 700; }
        .badge-borrowed { background: #fef3c7; color: #92400e; }
        .badge-returned { background: #d1fae5; color: #065f46; }
        .action-btn { padding: 5px 12px; border-radius: 15px; border: none; font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .action-btn.return-book-btn { background: #d1fae5; color: #065f46; }
        .action-btn.return-book-btn:hover { background: #a7f3d0; }
        .action-btn.delete-btn { background: #fee2e2; color: #991b1b; }
        .action-btn.delete-btn:hover { background: #fecaca; }
        .empty-state { text-align: center; padding: 40px 20px; color: #a0aec0; font-size: 0.95rem; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { padding: 13px 20px; border-radius: 25px; color: #fff; font-weight: 600; font-size: 0.9rem; box-shadow: var(--shadow-lg); animation: slideInToast 0.4s ease, fadeOutToast 0.3s ease 2.2s forwards; pointer-events: auto; max-width: 380px; }
        .toast.success { background: #10b981; }
        .toast.error { background: #ef4444; }
        .toast.info { background: #4a6cf7; }
        @keyframes slideInToast { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOutToast { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(80%); } }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5); z-index: 100; display: flex; align-items: center; justify-content: center; }
        .modal { background: #fff; border-radius: var(--radius); padding: 28px; width: 90%; max-width: 420px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 14px; }
        .modal h3 { font-size: 1.2rem; font-weight: 700; }
        .modal input { padding: 10px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-size: 0.95rem; outline: none; font-family: var(--font-mono); letter-spacing: 0.1em; transition: var(--transition); }
        .modal input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.1); }
        .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
        .modal-btns button { padding: 9px 18px; border-radius: 20px; border: none; font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: var(--transition); }
        .modal-btns .btn-confirm { background: var(--primary); color: #fff; }
        .modal-btns .btn-confirm:hover { background: var(--primary-hover); }
        .modal-btns .btn-cancel { background: #f1f5f9; color: #64748b; }
        .modal-btns .btn-cancel:hover { background: #e2e8f0; }
        .stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
        .stat-badge { padding: 6px 14px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
        .stat-total { background: #e0e7ff; color: #3730a3; }
        .stat-borrowing { background: #fef3c7; color: #92400e; }
        .stat-returned { background: #d1fae5; color: #065f46; }

        @media (max-width: 600px) {
            .card { padding: 16px 14px; }
            .form-row { flex-direction: column; gap: 10px; }
            .form-group { min-width: 100%; }
            .submit-btn { width: 100%; justify-content: center; padding: 14px; }
            .header h1 { font-size: 1.4rem; }
            .header .icon-row { font-size: 36px; }
            .tab-btn { font-size: 0.85rem; padding: 10px 14px; }
            table { font-size: 0.78rem; min-width: 550px; }
            table th, table td { padding: 8px 10px; }
            .lock-input-row input { width: 140px; }
            .lock-overlay { padding: 20px; gap: 10px; }
            .lock-icon { font-size: 40px; }
            .toast-container { right: 10px; left: 10px; top: 10px; }
            .toast { font-size: 0.8rem; padding: 10px 16px; max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon-row">📚</div>
            <h1>图书借阅管理系统</h1>
            <p class="subtitle">多设备同步 · 简单 · 安全</p>
        </div>

        <div class="card">
            <div class="tab-switch" id="tabSwitch">
                <button class="tab-btn tab-borrow active" data-tab="borrow">
                    <span class="tab-icon">📖</span> 借书登记
                </button>
                <button class="tab-btn tab-return" data-tab="return">
                    <span class="tab-icon">📗</span> 还书登记
                </button>
            </div>

            <div class="form-section active" id="formBorrow">
                <div class="form-row">
                    <div class="form-group">
                        <label>👤 借阅人姓名</label>
                        <input type="text" id="borrowName" placeholder="请输入姓名" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>📖 书名</label>
                        <input type="text" id="borrowBook" placeholder="请输入书名" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>📅 借书日期</label>
                        <input type="date" id="borrowDate">
                    </div>
                </div>
                <button class="submit-btn btn-borrow" id="borrowBtn">
                    ✍️ 确认借书
                </button>
            </div>

            <div class="form-section" id="formReturn">
                <div class="form-row">
                    <div class="form-group">
                        <label>👤 还书人姓名</label>
                        <input type="text" id="returnName" placeholder="请输入姓名" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>📖 书名</label>
                        <input type="text" id="returnBook" placeholder="请输入书名" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label>📅 还书日期</label>
                        <input type="date" id="returnDate">
                    </div>
                </div>
                <button class="submit-btn btn-return" id="returnBtn">
                    ✅ 确认还书
                </button>
            </div>
        </div>

        <div class="card table-section" id="tableSectionCard">
            <div class="table-header-row">
                <div class="table-title">📋 借阅记录</div>
                <div class="table-actions-row" id="tableActionsRow" style="display:none;">
                    <span class="stats-row" id="statsRow"></span>
                    <button class="btn-sm btn-change-pwd" onclick="openChangePwdModal()">🔑 改密码</button>
                    <button class="btn-sm btn-clear-all" onclick="clearAllRecords()">🗑 清空</button>
                    <button class="btn-sm btn-lock" onclick="lockTable()">🔒 锁定</button>
                </div>
            </div>

            <div class="lock-overlay" id="lockOverlay">
                <span class="lock-icon">🔐</span>
                <span class="lock-label">此表格已被密码保护</span>
                <div class="lock-input-row">
                    <input type="password" id="unlockPassword" placeholder="请输入密码" maxlength="30">
                    <button class="btn-unlock" onclick="unlockTable()">🔓 解锁</button>
                </div>
                <span class="lock-hint">💡 默认密码：<strong>admin123</strong>（解锁后可修改）</span>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>姓名</th>
                            <th>书名</th>
                            <th>借书日期</th>
                            <th>状态</th>
                            <th>还书日期</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7">
                                <div class="empty-state">
                                    <span class="empty-icon">📭</span>
                                    暂无借阅记录（或表格已锁定）
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-backdrop" id="pwdModal" style="display:none;">
        <div class="modal">
            <h3>🔑 修改解锁密码</h3>
            <input type="password" id="oldPwd" placeholder="请输入旧密码" maxlength="30">
            <input type="password" id="newPwd" placeholder="请输入新密码" maxlength="30">
            <input type="password" id="confirmPwd" placeholder="请确认新密码" maxlength="30">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closePwdModal()">取消</button>
                <button class="btn-confirm" onclick="confirmChangePwd()">确认修改</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== Supabase 初始化 ====================
        const SUPABASE_URL = 'https://aqlsoomclgcgwpjoutjz.supabase.co';      // ← 替换成您的 Project URL
        const SUPABASE_ANON_KEY = ' eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxbHNvb21jbGdjZ3dwam91dGp6Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MjY0MTA2NiwiZXhwIjoyMDk4MjE3MDY2fQ.tffZODigF8QTLpUeamINtHa7PqoXISNFihI372upjIg';  // ← 替换成您的 anon public key

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ==================== 密码管理（仍使用本地存储） ====================
        const PWD_STORAGE_KEY = 'library_password';
        const DEFAULT_PASSWORD = 'admin123';

        function getStoredPassword() {
            return localStorage.getItem(PWD_STORAGE_KEY) || DEFAULT_PASSWORD;
        }
        function setStoredPassword(newPwd) {
            localStorage.setItem(PWD_STORAGE_KEY, newPwd);
        }

        // ==================== 数据操作（改为 Supabase） ====================
        async function fetchRecords() {
            const { data, error } = await supabase
                .from('records')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) {
                console.error('获取记录失败:', error);
                showToast('获取记录失败，请稍后重试', 'error');
                return [];
            }
            return data;
        }

        async function addRecord(record) {
            const { data, error } = await supabase
                .from('records')
                .insert([{
                    name: record.name,
                    book_name: record.bookName,
                    status: record.status,
                    borrow_date: record.date,
                    return_date: record.returnDate
                }])
                .select();
            if (error) {
                console.error('添加记录失败:', error);
                showToast('添加记录失败，请重试', 'error');
                return null;
            }
            return data[0];
        }

        async function updateRecordById(id, updates) {
            const { error } = await supabase
                .from('records')
                .update(updates)
                .eq('id', id);
            if (error) {
                console.error('更新记录失败:', error);
                showToast('更新失败，请重试', 'error');
                return false;
            }
            return true;
        }

        async function deleteRecordById(id) {
            const { error } = await supabase
                .from('records')
                .delete()
                .eq('id', id);
            if (error) {
                console.error('删除记录失败:', error);
                showToast('删除失败，请重试', 'error');
                return false;
            }
            return true;
        }

        async function clearAllRecordsFromDB() {
            const { error } = await supabase
                .from('records')
                .delete()
                .neq('id', 0); // 删除所有记录
            if (error) {
                console.error('清空记录失败:', error);
                showToast('清空失败，请重试', 'error');
                return false;
            }
            return true;
        }

        // ==================== UI 状态 ====================
        let isTableUnlocked = false;
        let currentTab = 'borrow';

        const tabSwitch = document.getElementById('tabSwitch');
        const formBorrow = document.getElementById('formBorrow');
        const formReturn = document.getElementById('formReturn');
        const lockOverlay = document.getElementById('lockOverlay');
        const tableBody = document.getElementById('tableBody');
        const tableActionsRow = document.getElementById('tableActionsRow');
        const statsRow = document.getElementById('statsRow');
        const unlockPasswordInput = document.getElementById('unlockPassword');
        const toastContainer = document.getElementById('toastContainer');
        const pwdModal = document.getElementById('pwdModal');
        const borrowBtn = document.getElementById('borrowBtn');
        const returnBtn = document.getElementById('returnBtn');

        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('borrowDate').value = todayStr;
        document.getElementById('returnDate').value = todayStr;

        // Toast 通知
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            toastContainer.appendChild(toast);
            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2600);
        }

        // 标签切换
        tabSwitch.addEventListener('click', (e) => {
            const btn = e.target.closest('.tab-btn');
            if (!btn || btn.dataset.tab === currentTab) return;
            currentTab = btn.dataset.tab;
            tabSwitch.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            formBorrow.classList.remove('active');
            formReturn.classList.remove('active');
            if (currentTab === 'borrow') {
                formBorrow.classList.add('active');
                document.getElementById('borrowDate').value = todayStr;
            } else {
                formReturn.classList.add('active');
                document.getElementById('returnDate').value = todayStr;
            }
        });

        // 借书处理
        async function handleBorrow() {
            const name = document.getElementById('borrowName').value.trim();
            const bookName = document.getElementById('borrowBook').value.trim();
            const date = document.getElementById('borrowDate').value;
            if (!name) { showToast('请输入借阅人姓名', 'error'); return; }
            if (!bookName) { showToast('请输入书名', 'error'); return; }
            if (!date) { showToast('请选择借书日期', 'error'); return; }

            borrowBtn.disabled = true;
            const newRecord = await addRecord({
                name, bookName, date, status: '借出', returnDate: null
            });
            borrowBtn.disabled = false;

            if (newRecord) {
                showToast(`✅ ${name} 借阅《${bookName}》登记成功！`, 'success');
                document.getElementById('borrowName').value = '';
                document.getElementById('borrowBook').value = '';
                document.getElementById('borrowDate').value = todayStr;
                if (isTableUnlocked) await loadAndRenderTable();
            }
        }

        // 还书处理
        async function handleReturn() {
            const name = document.getElementById('returnName').value.trim();
            const bookName = document.getElementById('returnBook').value.trim();
            const date = document.getElementById('returnDate').value;
            if (!name) { showToast('请输入还书人姓名', 'error'); return; }
            if (!bookName) { showToast('请输入书名', 'error'); return; }
            if (!date) { showToast('请选择还书日期', 'error'); return; }

            returnBtn.disabled = true;
            // 先从数据库找到匹配的未还记录（最新的）
            const { data: matched } = await supabase
                .from('records')
                .select('*')
                .eq('name', name)
                .eq('book_name', bookName)
                .eq('status', '借出')
                .order('created_at', { ascending: false })
                .limit(1);

            if (!matched || matched.length === 0) {
                showToast(`❌ 未找到 ${name} 借阅《${bookName}》的未还记录`, 'error');
                returnBtn.disabled = false;
                return;
            }

            const success = await updateRecordById(matched[0].id, {
                status: '已还',
                return_date: date
            });
            returnBtn.disabled = false;

            if (success) {
                showToast(`✅ ${name} 归还《${bookName}》登记成功！`, 'success');
                document.getElementById('returnName').value = '';
                document.getElementById('returnBook').value = '';
                document.getElementById('returnDate').value = todayStr;
                if (isTableUnlocked) await loadAndRenderTable();
            }
        }

        // 从数据库加载并渲染表格
        async function loadAndRenderTable() {
            const records = await fetchRecords();
            if (records.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><span class="empty-icon">📭</span>暂无借阅记录</div></td></tr>`;
            } else {
                tableBody.innerHTML = records.map((r, i) => {
                    const statusBadge = r.status === '借出'
                        ? '<span class="badge badge-borrowed">📖 借出</span>'
                        : '<span class="badge badge-returned">📗 已还</span>';
                    const returnDateDisplay = r.return_date || '<span style="color:#c0c8d2;">—</span>';
                    let actionHtml = '';
                    if (r.status === '借出') {
                        actionHtml = `<button class="action-btn return-book-btn" onclick="quickReturn(${r.id})">📥 还书</button>`;
                    }
                    actionHtml += ` <button class="action-btn delete-btn" onclick="deleteSingleRecord(${r.id})">✕</button>`;
                    return `
                        <tr>
                            <td>${i + 1}</td>
                            <td><strong>${escapeHtml(r.name)}</strong></td>
                            <td>${escapeHtml(r.book_name)}</td>
                            <td>${r.borrow_date}</td>
                            <td>${statusBadge}</td>
                            <td>${returnDateDisplay}</td>
                            <td>${actionHtml}</td>
                        </tr>`;
                }).join('');
            }
            updateStats(records);
        }

        function updateStats(records) {
            const total = records.length;
            const borrowing = records.filter(r => r.status === '借出').length;
            const returned = records.filter(r => r.status === '已还').length;
            if (total > 0) {
                statsRow.innerHTML = `
                    <span class="stat-badge stat-total">📊 总计：${total}</span>
                    <span class="stat-badge stat-borrowing">📖 借出中：${borrowing}</span>
                    <span class="stat-badge stat-returned">📗 已还：${returned}</span>`;
            } else {
                statsRow.innerHTML = '';
            }
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 解锁表格
        async function unlockTable() {
            const inputPwd = unlockPasswordInput.value.trim();
            const storedPwd = getStoredPassword();
            if (!inputPwd) { showToast('请输入密码', 'error'); return; }
            if (inputPwd === storedPwd) {
                isTableUnlocked = true;
                lockOverlay.classList.add('hidden');
                tableActionsRow.style.display = 'flex';
                unlockPasswordInput.value = '';
                unlockPasswordInput.classList.remove('wrong');
                await loadAndRenderTable();
                showToast('🔓 表格已解锁，数据已从云端同步', 'success');
            } else {
                showToast('❌ 密码错误', 'error');
                unlockPasswordInput.classList.add('wrong');
                setTimeout(() => unlockPasswordInput.classList.remove('wrong'), 600);
            }
        }

        function lockTable() {
            isTableUnlocked = false;
            lockOverlay.classList.remove('hidden');
            tableActionsRow.style.display = 'none';
            unlockPasswordInput.value = '';
            tableBody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><span class="empty-icon">🔒</span>表格已锁定，请输入密码解锁查看</div></td></tr>`;
            statsRow.innerHTML = '';
            showToast('🔒 表格已锁定', 'info');
        }

        // 快捷还书（从表格按钮）
        async function quickReturn(id) {
            if (!isTableUnlocked) return;
            const today = new Date().toISOString().split('T')[0];
            const success = await updateRecordById(id, { status: '已还', return_date: today });
            if (success) {
                showToast('✅ 还书成功', 'success');
                await loadAndRenderTable();
            }
        }

        // 删除单条
        async function deleteSingleRecord(id) {
            if (!isTableUnlocked) return;
            if (confirm('确定要删除这条记录吗？')) {
                const success = await deleteRecordById(id);
                if (success) {
                    showToast('🗑 记录已删除', 'info');
                    await loadAndRenderTable();
                }
            }
        }

        // 清空全部
        async function clearAllRecords() {
            if (!isTableUnlocked) return;
            const records = await fetchRecords();
            if (records.length === 0) { showToast('没有可清空的记录', 'info'); return; }
            if (confirm(`⚠️ 确定要清空全部 ${records.length} 条记录吗？此操作不可恢复！`)) {
                if (confirm('再次确认：真的要清空吗？')) {
                    const success = await clearAllRecordsFromDB();
                    if (success) {
                        showToast('🗑 所有记录已清空', 'info');
                        await loadAndRenderTable();
                    }
                }
            }
        }

        // 修改密码（保持不变）
        function openChangePwdModal() {
            if (!isTableUnlocked) return;
            document.getElementById('oldPwd').value = '';
            document.getElementById('newPwd').value = '';
            document.getElementById('confirmPwd').value = '';
            pwdModal.style.display = 'flex';
        }
        function closePwdModal() { pwdModal.style.display = 'none'; }
        function confirmChangePwd() {
            const oldPwd = document.getElementById('oldPwd').value.trim();
            const newPwd = document.getElementById('newPwd').value.trim();
            const confirmPwd = document.getElementById('confirmPwd').value.trim();
            const storedPwd = getStoredPassword();
            if (!oldPwd || oldPwd !== storedPwd) { showToast('旧密码不正确', 'error'); return; }
            if (!newPwd || newPwd.length < 3) { showToast('新密码至少3位', 'error'); return; }
            if (newPwd !== confirmPwd) { showToast('两次密码不一致', 'error'); return; }
            setStoredPassword(newPwd);
            closePwdModal();
            showToast('🔑 密码修改成功', 'success');
        }

        // 回车解锁
        unlockPasswordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') unlockTable();
        });

        // 绑定按钮事件
        borrowBtn.addEventListener('click', handleBorrow);
        returnBtn.addEventListener('click', handleReturn);

        // 全局函数
        window.unlockTable = unlockTable;
        window.lockTable = lockTable;
        window.quickReturn = quickReturn;
        window.deleteSingleRecord = deleteSingleRecord;
        window.clearAllRecords = clearAllRecords;
        window.openChangePwdModal = openChangePwdModal;
        window.closePwdModal = closePwdModal;
        window.confirmChangePwd = confirmChangePwd;

        // 初始化锁定状态
        isTableUnlocked = false;
        lockOverlay.classList.remove('hidden');
        tableActionsRow.style.display = 'none';
        statsRow.innerHTML = '';

        console.log('📚 同步版借阅系统已就绪，数据存储在 Supabase 云端');
    </script>
</body>
</html>
